<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juris Assistant</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
  padding: 12px;
  min-width: 320px;
}

h3 {
  color: #1a472a;
  text-align: center;
  margin-bottom: 12px;
}

input, textarea, select {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 13px;
}

textarea {
  resize: vertical;
}

button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
}

button:hover {
  opacity: .9;
}

.btn-client { background: #2d6a4f; color: white; }
.btn-technical { background: #1e6091; color: white; }
.btn-petition { background: #7b2cbf; color: white; }
.btn-extract { background: #4a4a4a; color: white; }

.msg {
  background: #e8f0fe;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 8px;
}

pre {
  background: white;
  padding: 10px;
  font-size: 12px;
  white-space: pre-wrap;
  border-radius: 6px;
  border: 1px solid #ddd;
  max-height: 300px;
  overflow-y: auto;
}

.button-group {
  display: flex;
  gap: 6px;
}

.button-group button {
  flex: 1;
}

.role-group {
  display: flex;
  gap: 10px;
  background: #e8f0fe;
  padding: 8px;
  border-radius: 6px;
  justify-content: center;
}

.role-group label {
  font-size: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<h3>⚖️ Juris Assistant</h3>

<select id="tribunalSelect">
<option value="">🔗 Selecione o Tribunal...</option>
<option value="https://pje.tst.jus.br">TST</option>
<option value="https://pje.trt2.jus.br">TRT 2ª Região (SP)</option>
<option value="https://pje.trt15.jus.br">TRT 15ª Região</option>
<option value="https://pje.trt3.jus.br">TRT 3ª Região</option>
<option value="https://pje.trt4.jus.br">TRT 4ª Região</option>
<option value="https://pje.trt5.jus.br">TRT 5ª Região</option>
<option value="https://pje.trt6.jus.br">TRT 6ª Região</option>
<option value="https://pje.trt7.jus.br">TRT 7ª Região</option>
<option value="https://pje.trt8.jus.br">TRT 8ª Região</option>
<option value="https://pje.trt9.jus.br">TRT 9ª Região</option>
<option value="https://pje.trt10.jus.br">TRT 10ª Região</option>
<option value="https://pje.trt11.jus.br">TRT 11ª Região</option>
<option value="https://pje.trt12.jus.br">TRT 12ª Região</option>
<option value="https://pje.trt13.jus.br">TRT 13ª Região</option>
<option value="https://pje.trt14.jus.br">TRT 14ª Região</option>
<option value="https://pje.trt16.jus.br">TRT 16ª Região</option>
<option value="https://pje.trt17.jus.br">TRT 17ª Região</option>
<option value="https://pje.trt18.jus.br">TRT 18ª Região</option>
<option value="https://pje.trt19.jus.br">TRT 19ª Região</option>
<option value="https://pje.trt20.jus.br">TRT 20ª Região</option>
<option value="https://pje.trt21.jus.br">TRT 21ª Região</option>
<option value="https://pje.trt22.jus.br">TRT 22ª Região</option>
<option value="https://pje.trt23.jus.br">TRT 23ª Região</option>
<option value="https://pje.trt24.jus.br">TRT 24ª Região</option>
</select>

<button id="abrirTribunalBtn" class="btn-extract">🔗 Abrir Tribunal</button>

<input id="numeroProcesso" placeholder="Número do processo (opcional)" />

<button id="extrairProcessoBtn" class="btn-extract" style="background:#1a472a;">
📥 Extrair Processo
</button>

<div class="role-group">
<label>
<input type="radio" name="role" value="reclamante" checked>
Reclamante
</label>

<label>
<input type="radio" name="role" value="reclamada">
Reclamada
</label>
</div>

<button id="salvarRoleBtn" class="btn-extract" style="background:#1a472a;">
💾 Salvar posição
</button>

<textarea id="texto" rows="6"
placeholder="Clique em 'Extrair Processo' ou cole o texto..."></textarea>

<div class="button-group">
<button id="clienteBtn" class="btn-client">Resumo Cliente</button>
<button id="tecnicoBtn" class="btn-technical">Resumo Técnico</button>
<button id="peticaoBtn" class="btn-petition">Petição</button>
</div>

<div id="resultMsg" class="msg"></div>

<pre id="resultado"></pre>

<script src="sidepanel.js"></script>

</body>
</html>
