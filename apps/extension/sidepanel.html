<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juris Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; min-height: 100vh; padding: 16px; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; }
    h3 { color: #1a472a; text-align: center; margin: 0 0 16px 0; }
    input, textarea, select { width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin: 8px 0; font-weight: bold; font-size: 14px; transition: all 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-client { background: #2d6a4f; color: white; }
    .btn-technical { background: #1e6091; color: white; }
    .btn-petition { background: #7b2cbf; color: white; }
    .btn-extract { background: #4a4a4a; color: white; }
    .msg { padding: 10px; background: #e8f0fe; border-radius: 8px; font-size: 12px; margin: 8px 0; word-break: break-word; }
    pre { background: white; padding: 12px; font-size: 12px; white-space: pre-wrap; border-radius: 8px; border: 1px solid #ddd; max-height: 350px; overflow-y: auto; font-family: monospace; }
    .button-group { display: flex; gap: 8px; margin: 8px 0; }
    .button-group button { flex: 1; margin: 0; }
    .role-group { display: flex; gap: 16px; margin: 8px 0; padding: 10px; background: #e8f0fe; border-radius: 8px; justify-content: center; }
    .role-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h3>⚖️ Juris Assistant</h3>

  <!-- SELECT DE TRIBUNAIS (ID correto) -->
  <select id="tribunalSelect">
    <option value="">🔗 Selecione o Tribunal...</option>
    <option value="https://pje.tst.jus.br">⚖️ TST</option>
    <option value="https://pje.trt1.jus.br/primeirograu/login.seam">⚖️ TRT 1ª Região (RJ)</option>
    <option value="https://pje.trt2.jus.br">⚖️ TRT 2ª Região (SP - Capital)</option>
    <option value="https://pje.trt3.jus.br">⚖️ TRT 3ª Região (MG)</option>
    <option value="https://pje.trt4.jus.br">⚖️ TRT 4ª Região (RS)</option>
    <option value="https://pje.trt5.jus.br">⚖️ TRT 5ª Região (BA)</option>
    <option value="https://pje.trt6.jus.br">⚖️ TRT 6ª Região (PE)</option>
    <option value="https://pje.trt7.jus.br">⚖️ TRT 7ª Região (CE)</option>
    <option value="https://pje.trt8.jus.br">⚖️ TRT 8ª Região (PA/AP)</option>
    <option value="https://pje.trt9.jus.br">⚖️ TRT 9ª Região (PR)</option>
    <option value="https://pje.trt10.jus.br">⚖️ TRT 10ª Região (DF/TO)</option>
    <option value="https://pje.trt11.jus.br">⚖️ TRT 11ª Região (AM/RR)</option>
    <option value="https://pje.trt12.jus.br">⚖️ TRT 12ª Região (SC)</option>
    <option value="https://pje.trt13.jus.br">⚖️ TRT 13ª Região (PB)</option>
    <option value="https://pje.trt14.jus.br">⚖️ TRT 14ª Região (RO/AC)</option>
    <option value="https://pje.trt15.jus.br">⚖️ TRT 15ª Região (SP - Interior)</option>
    <option value="https://pje.trt16.jus.br">⚖️ TRT 16ª Região (MA)</option>
    <option value="https://pje.trt17.jus.br">⚖️ TRT 17ª Região (ES)</option>
    <option value="https://pje.trt18.jus.br">⚖️ TRT 18ª Região (GO)</option>
    <option value="https://pje.trt19.jus.br">⚖️ TRT 19ª Região (AL)</option>
    <option value="https://pje.trt20.jus.br">⚖️ TRT 20ª Região (SE)</option>
    <option value="https://pje.trt21.jus.br">⚖️ TRT 21ª Região (RN)</option>
    <option value="https://pje.trt22.jus.br">⚖️ TRT 22ª Região (PI)</option>
    <option value="https://pje.trt23.jus.br">⚖️ TRT 23ª Região (MT)</option>
    <option value="https://pje.trt24.jus.br">⚖️ TRT 24ª Região (MS)</option>
  </select>

  <!-- BOTÃO ABRIR TRIBUNAL -->
  <button id="abrirTribunalBtn" class="btn-extract">🔗 Abrir Tribunal</button>

  <!-- Número do processo -->
  <input type="text" id="numeroProcesso" placeholder="Número do processo (opcional)">

  <!-- BOTÃO EXTRAIR PROCESSO (único) -->
  <button id="extrairProcessoBtn" class="btn-extract" style="background:#1a472a;">📥 Extrair Processo</button>

  <!-- Seleção do Polo -->
  <div class="role-group">
    <label>
      <input type="radio" name="role" value="reclamante" checked> 📌 Reclamante (Trabalhador)
    </label>
    <label>
      <input type="radio" name="role" value="reclamada"> 🏢 Reclamada (Empresa)
    </label>
  </div>
  <button id="salvarRoleBtn" class="btn-extract" style="background:#1a472a;">💾 Salvar minha posição</button>

  <!-- Campo de texto -->
  <textarea id="texto" rows="6" placeholder="Cole aqui o andamento processual ou clique em 'Extrair Processo'..."></textarea>

  <!-- Botões de IA -->
  <div class="button-group">
    <button id="clienteBtn" class="btn-client">📱 Resumo para Cliente</button>
    <button id="tecnicoBtn" class="btn-technical">⚖️ Resumo Técnico</button>
    <button id="peticaoBtn" class="btn-petition">📝 Assistente de Petição</button>
  </div>

  <div id="resultMsg" class="msg"></div>
  <pre id="resultado"></pre>

  <script src="sidepanel.js"></script>
</body>
</html>
