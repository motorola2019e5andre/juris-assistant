<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juris Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; min-height: 100vh; padding: 16px; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; }
    h3 { color: #1a472a; text-align: center; margin: 0 0 16px 0; }
    input, textarea { width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin: 8px 0; font-weight: bold; font-size: 14px; transition: all 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-client { background: #2d6a4f; color: white; }
    .btn-technical { background: #1e6091; color: white; }
    .btn-petition { background: #7b2cbf; color: white; }
    .btn-extract { background: #4a4a4a; color: white; }
    .msg { padding: 10px; background: #e8f0fe; border-radius: 8px; font-size: 12px; margin: 8px 0; word-break: break-word; }
    pre { background: white; padding: 12px; font-size: 12px; white-space: pre-wrap; border-radius: 8px; border: 1px solid #ddd; max-height: 350px; overflow-y: auto; font-family: monospace; }
    .button-group { display: flex; gap: 8px; margin: 8px 0; }
    .button-group button { flex: 1; margin: 0; }
  </style>
</head>
<body>
  <h3>⚖️ Juris Assistant</h3>
  
  <div id="mainDiv">
    <!-- Número do processo -->
    <input type="text" id="numeroProcesso" placeholder="Número do processo (opcional)">
    
    <!-- Botão de extração -->
    <button id="extrairProcessoBtn" class="btn-extract" style="background:#1a472a;">📥 Extrair Processo</button>
    
    <!-- Campo de texto -->
    <textarea id="texto" rows="6" placeholder="Cole aqui o andamento processual ou clique em 'Extrair Processo'..."></textarea>
    
    <!-- Botões de IA (3 funcionalidades) -->
    <div class="button-group">
      <button id="clienteBtn" class="btn-client">📱 Resumo para Cliente</button>
      <button id="tecnicoBtn" class="btn-technical">⚖️ Resumo Técnico</button>
      <button id="peticaoBtn" class="btn-petition">📝 Assistente de Petição</button>
    </div>
    
    <div id="resultMsg" class="msg"></div>
    <pre id="resultado"></pre>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
