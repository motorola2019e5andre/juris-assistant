<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juris Assistant</title>
  <style>
    body { width: 480px; padding: 16px; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; }
    h3 { color: #1a472a; text-align: center; margin: 0 0 16px 0; }
    input, textarea { width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin: 8px 0; font-weight: bold; }
    .btn-client { background: #2d6a4f; color: white; }
    .btn-technical { background: #1e6091; color: white; }
    .btn-petition { background: #7b2cbf; color: white; }
    .btn-extract { background: #4a4a4a; color: white; }
    .btn-logout { background: #dc3545; color: white; margin-top: 0; }
    .msg { padding: 10px; background: #e8f0fe; border-radius: 8px; font-size: 12px; margin: 8px 0; }
    pre { background: white; padding: 12px; font-size: 12px; white-space: pre-wrap; border-radius: 8px; border: 1px solid #ddd; max-height: 350px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .logout-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
    select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
    .button-group { display: flex; gap: 8px; margin: 8px 0; }
    .button-group button { flex: 1; margin: 0; }
  </style>
</head>
<body>
  <h3>⚖️ Juris Assistant</h3>
  
  <!-- TELA DE LOGIN -->
  <div id="loginDiv">
    <input type="email" id="email" placeholder="E-mail" value="render@teste.com">
    <input type="password" id="senha" placeholder="Senha" value="123456">
    <button id="logarBtn" style="background:#2d6a4f;">LOGAR</button>
    <div id="statusMsg" class="msg">Aguardando login...</div>
  </div>
  
  <!-- TELA PRINCIPAL -->
  <div id="mainDiv" style="display:none;">
    <div class="header">
      <span id="userEmail" style="font-size:12px; color:#666;"></span>
      <button id="sairBtn" class="logout-btn">Sair</button>
    </div>
    
    <!-- LINKS RÁPIDOS PARA TRIBUNAIS -->
    <select id="tribunalSelect">
      <option value="">🔗 Acessar Tribunal...</option>
      <option value="https://pje.tst.jus.br">TST</option>
      <option value="https://pje.trt1.jus.br">TRT 1ª Região (RJ)</option>
      <option value="https://pje.trt2.jus.br">TRT 2ª Região (SP - Capital)</option>
      <option value="https://pje.trt3.jus.br">TRT 3ª Região (MG)</option>
      <option value="https://pje.trt4.jus.br">TRT 4ª Região (RS)</option>
      <option value="https://pje.trt5.jus.br">TRT 5ª Região (BA)</option>
      <option value="https://pje.trt6.jus.br">TRT 6ª Região (PE)</option>
      <option value="https://pje.trt7.jus.br">TRT 7ª Região (CE)</option>
      <option value="https://pje.trt8.jus.br">TRT 8ª Região (PA/AP)</option>
      <option value="https://pje.trt9.jus.br">TRT 9ª Região (PR)</option>
      <option value="https://pje.trt10.jus.br">TRT 10ª Região (DF/TO)</option>
      <option value="https://pje.trt11.jus.br">TRT 11ª Região (AM/RR)</option>
      <option value="https://pje.trt12.jus.br">TRT 12ª Região (SC)</option>
      <option value="https://pje.trt13.jus.br">TRT 13ª Região (PB)</option>
      <option value="https://pje.trt14.jus.br">TRT 14ª Região (RO/AC)</option>
      <option value="https://pje.trt15.jus.br">TRT 15ª Região (SP - Interior)</option>
      <option value="https://pje.trt16.jus.br">TRT 16ª Região (MA)</option>
      <option value="https://pje.trt17.jus.br">TRT 17ª Região (ES)</option>
      <option value="https://pje.trt18.jus.br">TRT 18ª Região (GO)</option>
      <option value="https://pje.trt19.jus.br">TRT 19ª Região (AL)</option>
      <option value="https://pje.trt20.jus.br">TRT 20ª Região (SE)</option>
      <option value="https://pje.trt21.jus.br">TRT 21ª Região (RN)</option>
      <option value="https://pje.trt22.jus.br">TRT 22ª Região (PI)</option>
      <option value="https://pje.trt23.jus.br">TRT 23ª Região (MT)</option>
      <option value="https://pje.trt24.jus.br">TRT 24ª Região (MS)</option>
    </select>
    
    <div class="button-group">
      <button id="abrirTribunalBtn" style="background:#4a4a4a;">🔗 Abrir Tribunal</button>
      <button id="extrairBtn" class="btn-extract">📥 Extrair Andamento</button>
    </div>
    
    <!-- NOVOS BOTÕES DE VERIFICAÇÃO DE LOGIN E EXTRAÇÃO -->
    <div id="tribunalStatus" class="msg" style="background:#e8f0fe; cursor:pointer;"></div>
    
    <div class="button-group">
      <button id="verificarLoginBtn" style="background:#4a4a4a;">🔍 Verificar Login no Tribunal</button>
      <button id="extrairProcessoBtn" class="btn-extract">📥 Extrair Processo</button>
    </div>
    
    <textarea id="texto" rows="5" placeholder="Cole aqui o andamento processual ou use o botão Extrair..."></textarea>
    
    <div class="button-group">
      <button id="clienteBtn" class="btn-client">📱 Resumo Cliente</button>
      <button id="tecnicoBtn" class="btn-technical">⚖️ Resumo Técnico</button>
      <button id="peticaoBtn" class="btn-petition">📝 Assistente Petição</button>
    </div>
    
    <div id="resultMsg" class="msg"></div>
    <pre id="resultado"></pre>
  </div>

  <script src="popup.js"></script>
</body>
</html>
